<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final JS Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/6aeb1423cc.js" crossorigin="anonymous"></script>
    <script src="index.js" defer></script>
</head>
<body>
    <div id="loading-screen">
        <i class="fa-solid fa-spinner"></i>
    </div>
    <header>
        <img class="header__img" src="./assets/pexels-markusspiske-11026543.jpg">
        <div class="header__content">
            <h1 class="title">All Movies</h1>
        </div>
    </header>
    <div class="row__submit">
        <div class="hidden"></div>
        <div class= "submit">
            <input type="text" id="submit__input">
            <i class="fa-solid fa-magnifying-glass submit__input--button"></i>
        </div>
        <div class="select__wrapper">
            <select id= "sortSelect" class="select">
                <option value="none">SORT BY</option>
                <option value="oldest">OLDEST TO NEWEST</option>
                <option value="newest">NEWEST TO OLDEST</option>
                <option value="az">A - Z</option>
                <option value="za">Z - A</option>
            </select>     
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="movie__list">
               <div class="movie">
                      <img src="">  
                      <h3></h3>
                      <b></b>
                    </div>
                </div>
               </div> 
            </div>
        </div>
    </div>
    <footer>
        <div class="footer__container">
            <div class="footer__row">
                <div class="footer__content">
                    <a href="#" class="footer__link">
                        <i class="fa-solid fa-arrow-up"></i>
                    </a>
                    <p>Back to Top</p>
                    <p class="footer__copyright">© 2026 All Rights Reserved</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
